    <title>Restautrent Bill</title>
</head>
<body>
    <script>
        
        // Basic Restaurant Bill: Declare variables for the prices of three food items, calculate the subtotal, add a 5% GST using arithmetic operators, 
        // and display the final bill using innerHTML. 

        let Burgur = 300
        let pizza = 200
        let chole = 600

        let subtotal = Burgur + pizza + chole
        console.log(subtotal);

        let gst = subtotal * 5 / 100
        console.log(gst);

        let Bill = subtotal + gst
        console.log(Bill);
        
    </script>
